version: "3.9"
services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: panganku
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: panganku_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: PanganKuJWTSecretKey2026VeryLongAndSecureForProduction
      AES_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      APP_PORT: 8080
      APP_ENV: development
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-your_bot_token_here}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-your_chat_id_here}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads

  web:
    build:
      context: ../panganku_mobile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: panganku_db
      MYSQL_USER: panganku
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "panganku", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1
    ports:
      - "6380:6379"

volumes:
  mysqldata:

