services:
  - type: web
    name: panganku-api
    env: go
    region: singapore
    plan: free
    buildCommand: go build -o server cmd/server/main.go
    startCommand: ./server
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SEED_DEFAULT_USERS
        value: false
      - key: SEED_DUMMY_DATA
        value: false

      # Isi dari TiDB Cloud Starter atau MySQL-compatible database lain.
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 4000
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: panganku
      - key: DB_TLS
        value: true
      - key: DB_MAX_IDLE_CONNS
        value: 5
      - key: DB_MAX_OPEN_CONNS
        value: 10
      - key: DB_CONN_MAX_LIFETIME_MINUTES
        value: 30

      # Isi dari Upstash Redis. Gunakan URL rediss://...
      - key: REDIS_URL
        sync: false

      # Isi setelah URL frontend Flutter Web sudah ada.
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
